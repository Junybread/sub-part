<style>
  body { font-family: Arial, sans-serif; background: #f4f6f8; }
  .container { max-width: 1200px; margin: 20px auto; background: #fff; padding: 20px; }
  h2 { margin-bottom: 5px; }
  .top-buttons { margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .top-buttons button {
    padding: 8px 14px; font-size: 13px; background: #1f3a5a;
    color: #fff; border: none; border-radius: 4px; cursor: pointer;
  }
  .top-buttons button:hover { background: #16304a; }
  .btn-back { background: #6c757d !important; }
  .btn-back:hover { background: #5a6268 !important; }
  .btn-download { background: #28a745 !important; }
  .btn-download:hover { background: #218838 !important; }

  .tab-bar { display: flex; gap: 4px; margin-bottom: 0; flex-wrap: wrap; }
  .tab-btn {
    padding: 8px 16px; font-size: 13px; cursor: pointer;
    border: 1px solid #ccc; border-bottom: none; border-radius: 4px 4px 0 0;
    background: #e9ecef; color: #333;

  .tab-content { display: none; border: 1px solid #ccc; padding: 15px; border-radius: 0 4px 4px 4px; }

  .table-wrap { overflow-x: auto; overflow-y: auto; max-height: 70vh; position: relative; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
  th, td { border: 1px solid #000; padding: 5px 7px; text-align: center; white-space: nowrap; }
  th { background: #1f3a5a; color: #fff; font-weight: normal; }
  th.sub { background: #cfdcf5; color: #000; }

  /* ── 틀 고정 ── */
  thead th { position: sticky; top: 0; z-index: 3; }

  /* 법인명 열 (1번째) */
  th.sticky-col, td.sticky-col {
    position: sticky; left: 0; z-index: 2;
    box-shadow: 2px 0 4px rgba(0,0,0,0.12);
  }
  thead th.sticky-col { z-index: 5; background: #1f3a5a; }
  thead th.sub.sticky-col { background: #cfdcf5; z-index: 5; }
  tbody td.sticky-col { background: #fff; }
  tfoot td.sticky-col, tr.total-row td.sticky-col { background: #e6e6e6; }

  /* 구분 열 (2번째, 탭3 후드용) */

    position: sticky; left: 162px; z-index: 2;
    box-shadow: 2px 0 4px rgba(0,0,0,0.08);
  }
  thead th.sticky-col2 { z-index: 5; background: #cfdcf5; }
  tbody td.sticky-col2 { background: #fff; }
  tfoot td.sticky-col2, tr.total-row td.sticky-col2 { background: #e6e6e6; }
  td.left { text-align: left; }
  .total-row { background: #e6e6e6; font-weight: bold; }
  .amount { color: #1a5276; }
  .loading { text-align: center; padding: 30px; color: #666; font-size: 14px; }
  .year-month { font-size: 13px; color: #666; margin-bottom: 10px; }
  /* 수정 가능 셀 */
  td.editable { cursor: pointer; position: relative; }
  td.editable:hover { background: #fffde7 !important; outline: 2px dashed #f39c12; }
  td.modified { background: #fff3cd !important; color: #856404 !important; font-weight: bold; }
  td.modified::after { content: '✎'; font-size: 10px; margin-left: 3px; color: #e67e22; }
  input.edit-input {
    width: 60px; text-align: center; border: 2px solid #f39c12;
    border-radius: 3px; padding: 2px; font-size: 12px; background: #fffff0;
  }
  .save-notice { font-size: 11px; color: #28a745; margin-left: 8px; display: none; }
</style>

// DB item명 → 발주서 표시명 매핑
const ITEM_ALIAS = {

document.addEventListener('DOMContentLoaded', async function() {

async function loadAllData() {
  try {
    const results = await Promise.all([
      supabaseClient.from('applications').select('*').eq('year', YEAR).eq('month', MONTH),
      supabaseClient.from('hood_applications').select('*').eq('year', YEAR).eq('month', MONTH),
      supabaseClient.from('users').select('username, branch_name').neq('role', 'admin').order('branch_name'),
    ]);
    allData = {
      apps: results[0].data || [],
      hoods: results[1].data || [],

    };
  } catch(e) {
    console.error(e);
    alert('데이터 불러오기 오류: ' + e.message);
  }
}

function getItemVal(app, itemName, field) {
  if (!app || !app.items) return 0;
  const item = app.items.find(i => (i.itemName || '').trim() === itemName);
  if (!item) return 0;
  return Number(item[field] || 0);
}

function fmt(n) { return n ? n.toLocaleString() : '0'; }

// 테이블을 스크롤 래퍼로 감싸고 법인명/품명 틀 고정
function wrapAndFreeze(html) {
  // table-wrap div로 감싸기
  html = html.replace(/<table/g, '<div class="table-wrap"><table');
  html = html.replace(/<\/table>/g, '</table></div>');

  // ── 1열: 법인명 고정 ──
  html = html.replace(/<th rowspan="(\d+)" class="left"([^>]*)>/g,
    '<th rowspan="$1" class="left sticky-col"$2>');
  html = html.replace(/<th class="left"([^>]*)>/g,
    '<th class="left sticky-col"$1>');
  html = html.replace(/<td class="left"([^>]*)>/g,
    '<td class="left sticky-col"$1>');
  // colspan 합계 행은 제외
  html = html.replace(/class="left sticky-col"([^>]*) colspan/g,
    'class="left"$1 colspan');

  // ── 2열: 구분(품명) 고정 - 탭3 후드 전용 ──
  // rowspan="2" class="sub">구분 → sticky-col2 추가
  html = html.replace(/<th rowspan="2" class="sub">구분<\/th>/g,
    '<th rowspan="2" class="sub sticky-col2">구분</th>');
  // tbody의 구분 td (pb1/tape 등 라벨) - left 없는 두번째 고정 열
  html = html.replace(/<td class="sub sticky-col2-target">/g,
    '<td class="sub sticky-col2">');

  return html;
}

// 렌더 후 2번째 헤더 행 top 위치 동적 계산
function fixStickyHeader(tabId) {
  const container = document.getElementById(tabId);
  if (!container) return;
  container.querySelectorAll('table').forEach(table => {
    const rows = table.querySelectorAll('thead tr');
    if (rows.length >= 2) {
      const firstRowH = rows[0].getBoundingClientRect().height || 36;
      rows[1].querySelectorAll('th').forEach(th => {
        th.style.top = firstRowH + 'px';
      });
    }
  });
}

// ───────────────────────────────────────────────
// 수정 공통 함수
// ───────────────────────────────────────────────

// 수량 셀 클릭 → input으로 전환
function makeEditable(td, branchId, itemName, field, origVal, onSave) {
  if (td.querySelector('input')) return;
  const input = document.createElement('input');
  input.type = 'number';
  input.min = '0';
  input.value = origVal;
  input.className = 'edit-input';
  input.style.width = (td.offsetWidth - 10) + 'px';

  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  input.select();

  async function commit() {
    const newVal = parseInt(input.value, 10) || 0;
    td.innerHTML = fmt(newVal);
    if (newVal !== origVal) {
      td.classList.add('modified');
      modifiedCells[branchId + '|' + itemName + '|' + field] = newVal;
      await saveToDb(branchId, itemName, field, newVal);
      if (onSave) onSave(td, branchId, newVal);
    }
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { td.innerHTML = fmt(origVal); }
  });
}

// DB 저장 - applications 테이블 items JSONB 업데이트
async function saveToDb(branchId, itemName, field, newVal) {
  try {
    const { data: appData, error: fetchErr } = await supabaseClient
      .from('applications')
      .select('id, items')
      .eq('branch_id', branchId)
      .eq('year', YEAR)
      .eq('month', MONTH)
      .single();

    if (fetchErr) throw fetchErr;

    const items = appData.items || [];
    const idx = items.findIndex(i => (i.itemName || '').trim() === itemName);
    if (idx !== -1) {
      items[idx][field] = newVal;
      items[idx]['adminModified'] = true; // 발주서에서 수정됨 표시
    } else {
      const newItem = { itemName: itemName, adminModified: true };
      newItem[field] = newVal;
      items.push(newItem);
    }

    const { error: updateErr } = await supabaseClient
      .from('applications')
      .update({ items: items })
      .eq('id', appData.id);

    if (updateErr) throw updateErr;

    // allData도 동기화
    const appInMem = allData.apps.find(a => a.branch_id === branchId);
    if (appInMem) {
      const memIdx = appInMem.items.findIndex(i => (i.itemName || '').trim() === itemName);
      if (memIdx !== -1) {
        appInMem.items[memIdx][field] = newVal;
        appInMem.items[memIdx]['adminModified'] = true;
      }
    }

    // 저장 후 DB 재조회로 adminModified 실제 저장 여부 검증
    const { data: verifyData } = await supabaseClient
      .from('applications')
      .select('items')
      .eq('branch_id', branchId)
      .eq('year', YEAR)
      .eq('month', MONTH)
      .single();
    if (verifyData) {
      const savedItem = verifyData.items.find(i => (i.itemName || '').trim() === itemName);
      console.log('✅ 저장 검증:', branchId, itemName, '→', savedItem);
      if (!savedItem || !savedItem.adminModified) {
        console.warn('⚠ adminModified 저장 실패! 재시도...');
        // 재시도: 방금 받아온 items로 다시 저장
        const retryItems = verifyData.items;
        const ri = retryItems.findIndex(i => (i.itemName || '').trim() === itemName);
        if (ri !== -1) {
          retryItems[ri][field] = newVal;
          retryItems[ri]['adminModified'] = true;
        }
        await supabaseClient.from('applications').update({ items: retryItems }).eq('id', appData.id);
        console.log('✅ 재시도 저장 완료');
      }
    }
  } catch(e) {
    alert('저장 오류: ' + e.message);
    console.error(e);
  }
}

// DB 저장 - hood_applications 테이블 컬럼 직접 업데이트

  } catch(e) {
    alert('저장 오류: ' + e.message);

  }
}

// ── 탭0: 아이존 (건식티슈, 습식티슈, 위생장갑) ──
function renderTab0_Aizone() {
  const items = [
    { name: '건식티슈',  packsPerBox: 100, price: 83000 },
    { name: '습식티슈',  packsPerBox: 50,  price: 46500 },
    { name: '위생장갑',  packsPerBox: 30,  price: 53100 },
  ];
  const { users, apps } = allData;

  let totalPacks = items.map(() => 0);
  let totalBoxes = items.map(() => 0);

  let html = `<p style="font-size:12px; color:#e67e22; margin:0 0 6px;">💡 수량(PACK) 셀을 클릭하면 직접 수정할 수 있습니다. 수정 시 DB에 자동 저장됩니다.</p>
  <table>
    <thead>
      <tr>
        <th rowspan="2" class="left" style="min-width:160px;">법인명</th>
        <th colspan="3">건식티슈<br><span style="font-size:11px;">(1BOX=${fmt(items[0].packsPerBox)}PACK / ${fmt(items[0].price)}원)</span></th>
        <th colspan="3">습식티슈<br><span style="font-size:11px;">(1BOX=${fmt(items[1].packsPerBox)}PACK / ${fmt(items[1].price)}원)</span></th>
        <th colspan="3">위생장갑<br><span style="font-size:11px;">(1BOX=${fmt(items[2].packsPerBox)}PACK / ${fmt(items[2].price)}원)</span></th>
        <th rowspan="2">합계금액</th>
      </tr>
      <tr>
        <th class="sub">수량(PACK)✎</th><th class="sub">수량(BOX)</th><th class="sub">금액</th>
        <th class="sub">수량(PACK)✎</th><th class="sub">수량(BOX)</th><th class="sub">금액</th>
        <th class="sub">수량(PACK)✎</th><th class="sub">수량(BOX)</th><th class="sub">금액</th>
      </tr>
    </thead><tbody id="tbody_tab0">`;

  let rows_data = [];
  users.forEach(u => {
    const app = apps.find(a => a.branch_id === u.username);
    const packs = items.map(item => getItemVal(app, item.name, 'packApply'));
    packs.forEach((p, idx) => { totalPacks[idx] += p; });
    const boxes = packs.map((p, idx) => p > 0 ? Math.ceil(p / items[idx].packsPerBox * 100) / 100 : 0);
    boxes.forEach((b, idx) => { totalBoxes[idx] += b; });
    const amounts = boxes.map((b, idx) => Math.round(b * items[idx].price));
    const rowTotal = amounts.reduce((a,b) => a+b, 0);
    if (packs.every(q => q === 0)) return;
    rows_data.push({ u, packs, boxes, amounts, rowTotal });

    html += `<tr id="row_aizone_${u.username}">
      <td class="left">${u.branch_name}</td>
      ${packs.map((p, idx) => {
        const isModified = modifiedCells[u.username+'|'+items[idx].name+'|packApply'] !== undefined;
        return `<td class="editable${isModified?' modified':''}" id="pack_${u.username}_${idx}" data-branch="${u.username}" data-item="${items[idx].name}" data-orig="${p}">${fmt(p)}</td>
        <td id="box_${u.username}_${idx}">${boxes[idx].toFixed(2)}</td>
        <td class="amount" id="amt_aizone_${u.username}_${idx}">${fmt(amounts[idx])}</td>`;

      <td class="amount" id="total_aizone_${u.username}"><b>${fmt(rowTotal)}</b></td>
    </tr>`;
  });

  const totalBoxAmounts = totalBoxes.map((b, idx) => Math.round(b * items[idx].price));
  const grandTotalAmt = totalBoxAmounts.reduce((a,b) => a+b, 0);

function updateAizoneColTotals(items) {
  items.forEach((item, idx) => {
    let sumPack = 0, sumBox = 0, sumAmt = 0;
    document.querySelectorAll('#tbody_tab0 td.editable[data-item="' + item.name + '"]').forEach(td => {
      const p = parseInt(td.dataset.orig, 10) || 0;
      const b = p > 0 ? Math.ceil(p / item.packsPerBox * 100) / 100 : 0;
      sumPack += p;
      sumBox += b;
      sumAmt += Math.round(b * item.price);
    });
    document.getElementById('sum_pack_aizone_' + idx).textContent = fmt(sumPack);
    document.getElementById('sum_box_aizone_' + idx).textContent = sumBox.toFixed(2);
    document.getElementById('sum_amt_aizone_' + idx).textContent = fmt(sumAmt);
  });
  let grandTotal = 0;
  for (let i = 0; i < 3; i++) {
    grandTotal += parseInt(document.getElementById('sum_amt_aizone_' + i).textContent.replace(/,/g, '')) || 0;
  }
  document.getElementById('sum_total_aizone').innerHTML = '<b>' + fmt(grandTotal) + '</b>';
}

// 공통 헬퍼 - applications 테이블 수정 이벤트 등록
// ───────────────────────────────────────────────
function registerSimpleEdit(tbodyId, table, items, field, onUpdate) {
  document.querySelectorAll('#' + tbodyId + ' td.editable').forEach(td => {
    td.addEventListener('click', function() {
      const branchId = td.dataset.branch;
      const itemName = td.dataset.item;
      const origVal = parseInt(td.dataset.orig, 10) || 0;
      const idx = items.findIndex(i => (i.name||i.db) === itemName);
      makeEditable(td, branchId, itemName, field, origVal, function(cell, bid, newVal) {
        td.dataset.orig = newVal;
        if (onUpdate) onUpdate(bid, idx, newVal);
      });
    });
  });
}

function updateSimpleTotals(tbodyId, items, qPfx, aPfx, totalId) {
  let grand = 0;
  items.forEach((item, idx) => {
    let sumQ = 0;
    document.querySelectorAll('#' + tbodyId + ' td.editable[data-item="' + (item.name||item.db) + '"]').forEach(td => {
      sumQ += parseInt(td.dataset.orig, 10) || 0;
    });
    const sumA = sumQ * item.price;
    grand += sumA;
    const qEl = document.getElementById(qPfx + idx);
    const aEl = document.getElementById(aPfx + idx);
    if (qEl) qEl.textContent = fmt(sumQ);
    if (aEl) aEl.textContent = fmt(sumA);
  });
  const tEl = document.getElementById(totalId);
  if (tEl) tEl.innerHTML = '<b>' + fmt(grand) + '</b>';
}

      <td class="amount" style="color:#c0392b;">${fmt(total)}</td>
      
    </tr>`;

  // 구분 헤더행(공급업체 sticky rowspan중): colspan4 = 나머지 4칸
  const sectRow = (bg, txt) =>
    `<tr><td colspan="4" style="background:${bg};font-size:11px;color:#856404;padding:3px 8px;font-weight:bold;">${txt}</td></tr>`;

  // 아이존 (col4=PACK수량, col5=BOX수량)
  aizoneItems.forEach((it, gi) => {
    const grpTd = gi===0 ? `<td class="sticky-col" rowspan="${aizoneItems.length+1}" style="background:#e3f2fd;font-weight:bold;font-size:12px;vertical-align:middle;">아이존</td>` : '';
    html += `<tr>${dataRow(grpTd, it.label, fmt(it.price)+'원/BOX', fmt(it._pack)+' PACK / '+fmt(it._box)+' BOX', it._amt)}</tr>`;
  });
  html += subRow('#dceefb', '아이존', groupTotals['아이존']);

  // 에프엔시스 (col4=EA수량, col5=-)
  fnsysItems.forEach((it, gi) => {
    const grpTd = gi===0 ? `<td class="sticky-col" rowspan="${fnsysItems.length+1}" style="background:#f3e5f5;font-weight:bold;font-size:12px;vertical-align:middle;">에프엔시스</td>` : '';
    html += `<tr>${dataRow(grpTd, it.label, fmt(it.price)+'원/EA', fmt(it._qty)+' EA', it._amt)}</tr>`;
  });
  html += subRow('#ede7f6', '에프엔시스', groupTotals['에프엔시스']);

  // 대성공구 잡자재
  const misc2Rows = misc2Pack.length + misc2EA.length + 2; // +2: 구분 헤더 행 2개
  html += `<tr>
    <td class="sticky-col" rowspan="${misc2Rows+1}" style="background:#fff8e1;font-weight:bold;font-size:12px;vertical-align:middle;">대성공구<br>(잡자재)</td>
    <td colspan="4" style="background:#fff3cd;font-size:11px;color:#856404;padding:3px 8px;font-weight:bold;">▶ PACK 단위 품목 (단가: 1PACK 기준)</td>
  </tr>`;
  misc2Pack.forEach(it => {
    html += `<tr>${dataRow('', it.label, fmt(it.price)+'원/PACK', fmt(it._ea)+' EA / '+it._pack+' PACK', it._amt)}</tr>`;
  });
  html += `<tr>
    <td colspan="4" style="background:#fff3cd;font-size:11px;color:#856404;padding:3px 8px;font-weight:bold;">▶ 낱개(EA) 단위 품목</td>
  </tr>`;
  misc2EA.forEach(it => {
    html += `<tr>${dataRow('', it.label, fmt(it.price)+'원/EA', fmt(it._qty)+' EA', it._amt)}</tr>`;
  });
  html += subRow('#fff0b3', '대성공구(잡자재)', groupTotals['대성공구(잡자재)']);

  // 대성공구 후드
  hoodItems.forEach((it, gi) => {
    const grpTd = gi===0 ? `<td class="sticky-col" rowspan="${hoodItems.length+1}" style="background:#fce4ec;font-weight:bold;font-size:12px;vertical-align:middle;">대성공구<br>(후드)</td>` : '';
    html += `<tr>${dataRow(grpTd, it.label, fmt(it.price)+'원/EA', fmt(it._qty)+' EA', it._amt)}</tr>`;
  });
  html += subRow('#fce4ec', '대성공구(후드)', groupTotals['대성공구(후드)']);

  // 신원튜브
  shinwonItems.forEach((it, gi) => {
    const grpTd = gi===0 ? `<td class="sticky-col" rowspan="${shinwonItems.length+1}" style="background:#e8f5e9;font-weight:bold;font-size:12px;vertical-align:middle;">신원튜브</td>` : '';
    html += `<tr>${dataRow(grpTd, it.label, fmt(it.price)+'원/EA', fmt(it._qty)+' EA', it._amt)}</tr>`;
  });
  html += subRow('#c8e6c9', '신원튜브', groupTotals['신원튜브']);

  html += `
    <tr style="background:#1f3a5a;color:#fff;font-weight:bold;font-size:13px;">
      <td class="sticky-col" style="background:#1f3a5a;">전체 합계</td>
      <td></td>
      <td style="text-align:right;padding-right:8px;color:#fff;">총 발주 금액</td>
      <td class="amount" style="color:#fff;">${fmt(grandTotal)}</td>
      <td></td>
    </tr>
    </tbody>
  </table>
  </div>`;

  document.getElementById('tab6').innerHTML = html;
}

function showTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.tab-content').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

// ───────────────────────────────────────────────
// 엑셀 다운로드
// ───────────────────────────────────────────────
const TAB_NAMES = ['아이존', '에프엔시스', '대성공구(잡자재)', '대성공구(후드)', '서비스봉투_폼테이프', '신원튜브'];

function tableToAoa(tabIdx) {
  const el = document.getElementById('tab' + tabIdx);
  const tables = el.querySelectorAll('table');
  let result = [];
  tables.forEach(table => {
    const rows = table.querySelectorAll('tr');
    rows.forEach(row => {
      const cells = row.querySelectorAll('th, td');
      result.push(Array.from(cells).map(c => c.innerText.trim()));
    });
    result.push([]); // 테이블 간 빈 행
  });
  return result;
}

function downloadCurrentTab() {
  const aoa = tableToAoa(currentTab);
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, TAB_NAMES[currentTab]);
  XLSX.writeFile(wb, TAB_NAMES[currentTab] + '_발주서_20' + YEAR + '년' + MONTH + '월.xlsx');
}

function downloadAllTabs() {
  const wb = XLSX.utils.book_new();
  TAB_NAMES.forEach((name, idx) => {
    const aoa = tableToAoa(idx);
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    XLSX.utils.book_append_sheet(wb, ws, name);
  });
  XLSX.writeFile(wb, '전체_발주서_20' + YEAR + '년' + MONTH + '월.xlsx');
}
</script>
